    body {
      margin:0; height:100vh; overflow:hidden;
      background: linear-gradient(to bottom, #ff6b00, #8b4513, #2a1a0a);

    h1 { text-shadow: 0 0 15px #00ffff; margin: 20px 0; }
    p.subtitle { font-size: 1.2em; opacity: 0.9; text-shadow: 0 0 5px #00ffff; }

    .scene { width: 400px; height: 400px; perspective: 1200px; position: relative; }
    .cube {
      width: 100%; height: 100%; position: relative; transform-style: preserve-3d;
      transition: transform 2s ease; transform: rotateX(-25deg) rotateY(-35deg);
    }
    .cube:hover { transform: rotateX(-25deg) rotateY(325deg); }

    .face {
      position: absolute; width: 400px; height: 400px; background: rgba(0,255,255,0.18);
      border: 2px solid #00ffff; backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center; font-size: 1.4em; text-align: center;
      box-shadow: 0 0 40px #00ffff, inset 0 0 20px #00ffff;
      transition: all 0.4s;
    }
    .face:hover { transform: scale(1.08); box-shadow: 0 0 80px #00ffff, inset 0 0 40px #00ffff; }
    .face::after {
      content: attr(data-desc); position: absolute; bottom: -50px; background: rgba(0,0,0,0.75);
      padding: 10px 15px; border-radius: 6px; font-size: 0.9em; white-space: nowrap; opacity: 0;
      transition: opacity 0.3s; pointer-events: none;
    }
    .face:hover::after { opacity: 1; }

    .front  { transform: translateZ(200px); }
    .back   { transform: rotateY(180deg) translateZ(200px); }
    .right  { transform: rotateY(90deg) translateZ(200px); }
    .left   { transform: rotateY(-90deg) translateZ(200px); }
    .top    { transform: rotateX(90deg) translateZ(200px); }
